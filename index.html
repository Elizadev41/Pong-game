<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Paddle Ball</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <main class="app">
    <div class="topbar">
      <p class="hint">Move the mouse or use WASD / arrows. Press P to pause.</p>
      <button id="soundToggle" class="sound-toggle" type="button" aria-pressed="false">Sound: On</button>
    </div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <p class="hint">Click the canvas or press a key once to enable sound in your browser.</p>
  </main>
  <script src="script.js"></script>
</body>

</html>
